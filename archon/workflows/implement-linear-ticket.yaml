name: implement-linear-ticket
description: Implements a Linear ticket end-to-end
provider: claude

nodes:
  - id: validate-ticket
    command: fetch-and-validate-linear-ticket
    model: haiku
    output_format:
      type: object
      properties:
        ready:
          type: string
          enum: ["true", "false"]
        error:
          type: string
      required: [ready]

  - id: cancel-if-not-ready
    cancel: "Ticket validation failed — see error above. Attach a plan file before running this workflow."
    depends_on: [validate-ticket]
    when: "$validate-ticket.output.ready != 'true'"

  - id: implement-ticket
    command: implement-linear-ticket
    context: fresh
    model: opus
    depends_on: [validate-ticket]
    when: "$validate-ticket.output.ready == 'true'"

  - id: lint-typecheck-format
    command: lint-typecheck-format
    context: fresh
    model: haiku
    depends_on: [implement-ticket]

  - id: unit-tests
    command: implement-unit-tests
    context: fresh
    model: opus
    depends_on: [lint-typecheck-format]
    skills:
      - vitest-unit-tests

  - id: lint-typecheck-format-post-tests
    command: lint-typecheck-format
    context: fresh
    model: haiku
    depends_on: [unit-tests]

  - id: request-code-review
    command: request-code-review
    context: fresh
    model: opus
    depends_on: [lint-typecheck-format-post-tests]
    skills:
      - requesting-code-review

  - id: fix-review-issues
    command: fix-review-issues
    context: fresh
    model: opus
    depends_on: [request-code-review]

  - id: lint-typecheck-format-post-review
    command: lint-typecheck-format
    context: fresh
    model: haiku
    depends_on: [fix-review-issues]

  - id: unit-tests-post-review
    command: implement-unit-tests
    context: fresh
    model: opus
    depends_on: [lint-typecheck-format-post-review]
    skills:
      - vitest-unit-tests

  - id: lint-typecheck-format-final
    command: lint-typecheck-format
    context: fresh
    model: haiku
    depends_on: [unit-tests-post-review]

  - id: commit-and-create-pr
    command: commit-and-create-pr
    context: fresh
    model: haiku
    depends_on: [lint-typecheck-format-final]

  - id: trigger-claude-pr-review
    command: trigger-claude-pr-review
    context: fresh
    model: haiku
    depends_on: [commit-and-create-pr]

  # NOTE: wait-for-claude-pr-review and fetch-review-comments both key off the literal
  # string "Claude finished" — the canonical completion marker posted by the
  # anthropics/claude-code-action GitHub Action (e.g. "**Claude finished @user's task in 2m 58s**").
  # If that action changes its template wording, both nodes will silently fail to detect the
  # review: the loop will time out after max_iterations, and fetch-review-comments will return
  # empty (causing classify to report count "0" and the workflow to skip apply-pr-review-fixes).
  # If the loop starts timing out unexpectedly, check a recent bot comment body for the new marker.
  - id: wait-for-claude-pr-review
    loop:
      prompt: |
        You are in a FRESH session waiting for the Claude Code Action to complete its PR review.

        Read the trigger timestamp from "$ARTIFACTS_DIR/review-trigger-time.txt", then check
        for any comments from `github-actions[bot]` on the current branch's PR that were posted
        after that time.

        If a review is present, summarise the findings.
        If not yet complete, report how long we've been waiting.

        When the review is found, output: <promise>REVIEW_COMPLETE</promise>
      until: REVIEW_COMPLETE
      until_bash: "TRIGGER_TIME=$(cat \"$ARTIFACTS_DIR/review-trigger-time.txt\" 2>/dev/null || echo \"1970-01-01T00:00:00Z\"); sleep 60 && gh pr view --json comments | jq -r --arg after \"$TRIGGER_TIME\" '[.comments[] | select((.author.login | startswith(\"github-actions\")) and .createdAt > $after and (.body | contains(\"Claude finished\"))) | .body] | join(\"\n\")' | grep -q ."
      max_iterations: 15
      fresh_context: true
    depends_on: [trigger-claude-pr-review]

  - id: fetch-review-comments
    bash: |
      TRIGGER_TIME=$(cat "$ARTIFACTS_DIR/review-trigger-time.txt" 2>/dev/null || echo "1970-01-01T00:00:00Z")
      gh pr view --json comments \
        | jq -r --arg after "$TRIGGER_TIME" \
        '[.comments[] | select((.author.login | startswith("github-actions")) and .createdAt > $after and (.body | contains("Claude finished"))) | .body] | join("\n\n---\n\n")'
    depends_on: [wait-for-claude-pr-review]

  - id: classify-review-comments
    prompt: |
      You are triaging automated PR review output to identify actionable issues that require code changes.

      PR review comments:
      $fetch-review-comments.output

      Identify every distinct issue that is: critical, important, a bug, a security vulnerability,
      a correctness problem, or explicitly marked as high-priority or urgent.

      Strong include signals (treat as actionable):
        - Headings/labels: **Critical**, **Important**, **Bug**, **Security**, **Must fix**, **Blocker**
        - Emojis: 🔴, 🛑, ❌, ⚠️ (when paired with a concrete defect, not a checklist mark)
        - Phrases: "this will break", "incorrect", "race condition", "memory leak", "unhandled"

      Strong exclude signals (skip these):
        - Headings/labels: **Nit**, **Minor**, **Optional**, **Style**, **Suggestion**, **Consider**, **FYI**
        - Phrases: "could also", "you might", "consider", "nice to have", "in a follow-up"
        - Approval language with no defect: "looks good", "LGTM", "recommended for merge"

      If the review explicitly states it is approved / recommended for merge AND lists only nits/minor
      suggestions, return count "0".

      Each entry in "comments" must be self-contained — include enough context (file, function, description)
      for an agent working in isolation to understand exactly what needs fixing without reading the full review.

      Return ONLY valid JSON — no prose, no markdown fences.
    model: haiku
    allowed_tools: []
    output_format:
      type: object
      properties:
        count:
          type: string
          description: Total number of critical/important issues requiring fixes, as a string (e.g. "0", "3")
        comments:
          type: array
          description: One self-contained issue description per entry
          items:
            type: string
      required: [count, comments]
    depends_on: [fetch-review-comments]

  - id: no-critical-issues
    cancel: "No critical or important issues found in the PR review — no fixes required."
    when: "$classify-review-comments.output.count == '0'"
    depends_on: [classify-review-comments]

  - id: apply-pr-review-fixes
    prompt: |
      You are fixing critical and important issues identified in a PR review by the Claude Code Action.

      Issues to fix:
      $classify-review-comments.output

      Fix each issue listed in the "comments" array. No more, no less.

      Rules:
      - Read the relevant files to understand context before making changes.
      - Fix only what the issue describes — do not refactor surrounding code or fix unrelated issues.
      - Follow existing patterns and conventions in the codebase.
      - If a fix spans multiple files, make all necessary changes.

      After fixing all issues, print a concise summary of what was changed.
    model: opus
    context: fresh
    when: "$classify-review-comments.output.count > '0'"
    depends_on: [classify-review-comments]

  - id: commit-and-push-pr-fixes
    command: commit-and-create-pr
    context: fresh
    model: haiku
    depends_on: [apply-pr-review-fixes]
